name: Watch Home Assistant breaking changes
run-name: Home Assistant breaking changes (${{ inputs.output_mode || 'console' }})

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      output_mode:
        description: How to publish findings
        required: false
        default: console
        type: choice
        options:
          - console
          - issue

permissions:
  contents: read
  issues: write
  models: read

concurrency:
  group: ha-breaking-change-watch
  cancel-in-progress: false

jobs:
  detect-breaking-changes:
    runs-on: ubuntu-latest
    env:
      RELEASE_NOTES_INDEX: https://www.home-assistant.io/blog/categories/release-notes/
      DEVELOPER_BLOG_INDEX: https://developers.home-assistant.io/blog/
      BUILDER_MIGRATION_POST: https://developers.home-assistant.io/blog/2026/04/02/builder-migration/
      GITHUB_MODELS_MODEL: openai/gpt-4.1-mini
      MIN_RISK_SCORE: '0.45'
      OUTPUT_MODE: console
      MAX_CONTEXT_FILES: '25'
      MAX_CONTEXT_CHARS: '80000'
      MAX_FILE_CHARS: '8000'
      MAX_RELEASES: '3'
      MAX_DEV_POSTS: '5'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build repository context
        id: ctx
        shell: bash
        run: |
          python <<'PY'
          import glob, json, os
          from pathlib import Path

          max_files = int(os.environ['MAX_CONTEXT_FILES'])
          max_total = int(os.environ['MAX_CONTEXT_CHARS'])
          max_file = int(os.environ['MAX_FILE_CHARS'])

          patterns = [
              'repository.yaml','build.yaml','build.yml','config.yaml','config.yml','Dockerfile','run.sh',
              '**/config.yaml','**/config.yml','**/build.yaml','**/build.yml','**/Dockerfile','**/run.sh',
              'README*','DOCS*','CHANGELOG*','**/*.md'
          ]

          def score(p: str) -> int:
              p = p.lower()
              s = 0
              if p.endswith('config.yaml') or p.endswith('config.yml'): s += 120
              if p.endswith('build.yaml') or p.endswith('build.yml'): s += 110
              if p.endswith('repository.yaml'): s += 105
              if p.endswith('dockerfile'): s += 100
              if p.endswith('run.sh'): s += 85
              if 'rootfs/' in p: s += 40
              if 'readme' in p: s += 60
              if p.endswith('.md'): s += 20
              if '/test' in p or '/tests' in p: s -= 30
              if '/example' in p or '/examples' in p: s -= 20
              return s

          files = []
          seen = set()
          for pat in patterns:
              for f in glob.glob(pat, recursive=True):
                  if f in seen:
                      continue
                  seen.add(f)
                  if not os.path.isfile(f):
                      continue
                  if f.startswith('.git') or f.startswith('.github'):
                      continue
                  files.append(f)

          files = sorted(files, key=lambda x: (-score(x), x))[:max_files]

          total = 0
          used = []
          parts = []

          for f in files:
              try:
                  c = Path(f).read_text(encoding='utf-8')[:max_file]
              except Exception:
                  continue
              block = f"\n\n### FILE: {f}\n{c.strip()}"
              if total + len(block) > max_total:
                  break
              parts.append(block)
              used.append(f)
              total += len(block)

          ctx = '\n'.join(parts)
          Path('addon_context.txt').write_text(ctx, encoding='utf-8')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as o:
              o.write(f"files={json.dumps(used, separators=(',', ':'))}\n")
              o.write(f"chars={len(ctx)}\n")
          PY

      - name: Analyze Home Assistant sources and publish results
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FILES: ${{ steps.ctx.outputs.files }}
          CHARS: ${{ steps.ctx.outputs.chars }}
          INPUT_OUTPUT_MODE: ${{ inputs.output_mode }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;

            const githubToken = process.env.GITHUB_TOKEN;
            const outputModeRaw = (process.env.INPUT_OUTPUT_MODE || process.env.OUTPUT_MODE || 'console').trim().toLowerCase();
            const outputMode = ['console', 'issue'].includes(outputModeRaw) ? outputModeRaw : 'console';
            const modelName = process.env.GITHUB_MODELS_MODEL || 'openai/gpt-4.1-mini';
            const minRiskScore = Number(process.env.MIN_RISK_SCORE || '0.45');
            const maxReleases = Number(process.env.MAX_RELEASES || '3');
            const maxDevPosts = Number(process.env.MAX_DEV_POSTS || '5');
            const files = JSON.parse(process.env.FILES || '[]');
            const contextChars = Number(process.env.CHARS || '0');
            const repoContext = fs.readFileSync('addon_context.txt', 'utf8');

            const decodeHtml = (value) => value
              .replace(/&#39;/g, "'")
              .replace(/&quot;/g, '"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&nbsp;/g, ' ');

            const htmlToText = (html) => decodeHtml(
              html
                .replace(/<script[\s\S]*?<\/script>/gi, ' ')
                .replace(/<style[\s\S]*?<\/style>/gi, ' ')
                .replace(/<[^>]+>/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
            );

            const absoluteUrl = (maybePath, base) => {
              try {
                return new URL(maybePath, base).toString();
              } catch {
                return null;
              }
            };

            const unique = (items) => [...new Set(items.filter(Boolean))];

            const parseModelText = (payload) => {
              if (typeof payload?.choices?.[0]?.message?.content === 'string') {
                return payload.choices[0].message.content.trim();
              }
              if (Array.isArray(payload?.choices?.[0]?.message?.content)) {
                return payload.choices[0].message.content.map((item) => item?.text || item?.content || '').join('').trim();
              }
              return '';
            };

            const parseJsonResponse = (text) => {
              const trimmed = text.trim();
              try {
                return JSON.parse(trimmed);
              } catch (error) {
                const match = trimmed.match(/```json\s*([\s\S]*?)```/i) || trimmed.match(/```\s*([\s\S]*?)```/i);
                if (match) return JSON.parse(match[1].trim());
                throw error;
              }
            };

            const sanitizeScalar = (value, maxLength = 3000) => {
              if (value === null || value === undefined) return '';
              let text = String(value);
              text = text.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, ' ');
              text = text.replace(/\r/g, '');
              text = text.replace(/^::/gm, '∷');
              text = text.replace(/<<\s*EOF/gi, '[redacted-heredoc]');
              text = text.replace(/(gh[pousr]_[A-Za-z0-9_]+)/g, '[redacted-github-token]');
              text = text.replace(/(sk-[A-Za-z0-9_-]{10,})/g, '[redacted-api-key]');
              text = text.replace(/\$\{\{\s*secrets\.[^}]+\}\}/gi, '[redacted-secret-reference]');
              text = text.replace(/\s+/g, ' ').trim();
              if (text.length > maxLength) text = `${text.slice(0, maxLength - 20)} …[truncated]`;
              return text;
            };

            const sanitizeList = (value, itemMaxLength = 500, maxItems = 12) => {
              if (!Array.isArray(value)) return [];
              return value.slice(0, maxItems).map((item) => sanitizeScalar(item, itemMaxLength)).filter(Boolean);
            };

            const sanitizeMatchedChanges = (value) => {
              if (!Array.isArray(value)) return [];
              return value.slice(0, 8).map((item) => ({
                title: sanitizeScalar(item?.title || 'Relevant change', 160),
                excerpt: sanitizeScalar(item?.excerpt || '', 900),
                impact: sanitizeScalar(item?.impact || '', 500)
              })).filter((item) => item.title || item.excerpt || item.impact);
            };

            const securityCheck = (analysis) => {
              const sanitized = {
                should_create_finding: Boolean(analysis?.should_create_finding ?? analysis?.should_open_issue),
                risk_score: Math.min(1, Math.max(0, Number(analysis?.risk_score || 0))),
                severity: ['low', 'medium', 'high', 'critical'].includes(String(analysis?.severity || '').toLowerCase()) ? String(analysis.severity).toLowerCase() : 'medium',
                summary: sanitizeScalar(analysis?.summary || 'Potential compatibility impact detected.', 1000),
                reasoning: sanitizeList(analysis?.reasoning, 400, 8),
                matched_changes: sanitizeMatchedChanges(analysis?.matched_changes),
                fix_suggestions: sanitizeList(analysis?.fix_suggestions, 400, 10),
                testing_checklist: sanitizeList(analysis?.testing_checklist, 400, 10),
                confidence: ['low', 'medium', 'high'].includes(String(analysis?.confidence || '').toLowerCase()) ? String(analysis.confidence).toLowerCase() : 'medium'
              };

              const blockedPatterns = [
                /[A-Za-z0-9_]*token[A-Za-z0-9_]*/i,
                /private key/i,
                /authorization:/i,
                /bearer\s+[A-Za-z0-9._-]+/i,
                /::set-output/i,
                /::add-mask/i,
                /GITHUB_ENV/i,
                /GITHUB_OUTPUT/i
              ];

              const combined = JSON.stringify(sanitized);
              if (blockedPatterns.some((pattern) => pattern.test(combined))) {
                sanitized.summary = 'Potential compatibility impact detected, but the generated analysis was sanitized because it contained unsafe output patterns.';
                sanitized.reasoning = ['The generated response contained content patterns that are not allowed to be emitted by the workflow.'];
                sanitized.matched_changes = [];
                sanitized.fix_suggestions = ['Review the Home Assistant source material manually for this item.'];
                sanitized.testing_checklist = ['Run a manual validation of install, startup, logs, and the add-on main functionality.'];
                sanitized.confidence = 'low';
              }

              return sanitized;
            };

            const fetchReleaseSources = async () => {
              const indexHtml = await fetch(process.env.RELEASE_NOTES_INDEX).then(async (response) => {
                if (!response.ok) throw new Error(`Failed to fetch release note index: ${response.status} ${response.statusText}`);
                return response.text();
              });

              const links = unique(
                [...indexHtml.matchAll(/href="(\/blog\/\d{4}\/\d{2}\/\d{2}\/release-[^"]+)"/g)]
                  .map((m) => absoluteUrl(m[1], 'https://www.home-assistant.io'))
              ).slice(0, maxReleases);

              return links.map((url) => ({ type: 'release_notes', url }));
            };

            const fetchDeveloperBlogSources = async () => {
              const indexHtml = await fetch(process.env.DEVELOPER_BLOG_INDEX).then(async (response) => {
                if (!response.ok) throw new Error(`Failed to fetch developer blog index: ${response.status} ${response.statusText}`);
                return response.text();
              });

              const candidateLinks = unique(
                [...indexHtml.matchAll(/href="([^"]+)"/g)]
                  .map((m) => absoluteUrl(m[1], process.env.DEVELOPER_BLOG_INDEX))
                  .filter((url) => url && url.startsWith('https://developers.home-assistant.io/blog/'))
                  .filter((url) => /\/blog\/\d{4}\/\d{2}\/\d{2}\//.test(url))
              );

              const prioritized = [
                process.env.BUILDER_MIGRATION_POST,
                ...candidateLinks.filter((url) => url !== process.env.BUILDER_MIGRATION_POST)
              ];

              return unique(prioritized).slice(0, maxDevPosts).map((url) => ({ type: 'developer_blog', url }));
            };

            const itemIdFromUrl = (type, url) => {
              if (type === 'release_notes') {
                const match = url.match(/release-(\d{4})(\d{1,2})\/?$/);
                if (match) return `${match[1]}.${String(Number(match[2]))}`;
              }
              const clean = url.replace(/https?:\/\//, '').replace(/\/$/, '');
              return clean.split('/').slice(-2).join('/');
            };

            const displaySourceType = (type) => type === 'developer_blog' ? 'Developer Blog' : 'Release Notes';

            const findInterestingSections = (text, type) => {
              const commonTerms = [
                'backward-incompatible changes', 'breaking change', 'deprecated', 'deprecation', 'removed',
                'supervisor', 'add-on', 'addon', 'docker', 'container', 'ingress', 'api', 'websocket',
                'frontend', 'panel', 'authentication', 'python', 'base image'
              ];
              const developerTerms = ['builder', 'buildkit', 'build.yaml', 'dockerfile', 'migration', 'labels', 'multi-arch', 'base image'];
              const terms = type === 'developer_blog' ? [...commonTerms, ...developerTerms] : commonTerms;

              const lower = text.toLowerCase();
              const snippets = [];
              for (const term of terms) {
                let startIndex = 0;
                while (true) {
                  const idx = lower.indexOf(term, startIndex);
                  if (idx === -1) break;
                  const start = Math.max(0, idx - 600);
                  const end = Math.min(text.length, idx + term.length + 900);
                  snippets.push(text.slice(start, end).trim());
                  startIndex = idx + term.length;
                  if (snippets.length >= 12) break;
                }
                if (snippets.length >= 12) break;
              }
              return unique(snippets).slice(0, 8);
            };

            const renderFindingMarkdown = (finding) => {
              const matched = finding.analysis.matched_changes || [];
              const reasoning = finding.analysis.reasoning || [];
              const suggestions = finding.analysis.fix_suggestions || [];
              const checklist = finding.analysis.testing_checklist || [];
              return [
                `### ${finding.title}`,
                `- Source type: ${displaySourceType(finding.type)}`,
                `- Source URL: ${finding.url}`,
                `- Risk score: ${finding.analysis.risk_score}`,
                `- Severity: ${finding.analysis.severity}`,
                `- Confidence: ${finding.analysis.confidence}`,
                '',
                '**Summary**',
                finding.analysis.summary,
                '',
                '**Why this matters**',
                ...(reasoning.length ? reasoning.map((item) => `- ${item}`) : ['- No additional reasoning provided.']),
                '',
                '**Potential adjustments**',
                ...(suggestions.length ? suggestions.map((item) => `- ${item}`) : ['- Review implementation and packaging against the source material.']),
                '',
                '**Testing checklist**',
                ...(checklist.length ? checklist.map((item) => `- ${item}`) : ['- Verify install, startup, logs, and the main user flow.']),
                '',
                '**Matched excerpts**',
                ...(matched.length ? matched.flatMap((item) => [`- **${item.title}**`, `  - Excerpt: ${item.excerpt || 'n/a'}`, `  - Impact: ${item.impact || 'n/a'}`]) : ['- No structured matched changes returned.']),
                ''
              ].join('\n');
            };

            const renderOverviewMarkdown = (sources, findings) => {
              const releaseSources = sources.filter((item) => item.type === 'release_notes');
              const developerSources = sources.filter((item) => item.type === 'developer_blog');
              return [
                '## Analysis overview',
                '',
                `- Repository: ${repoFullName}`,
                `- Model: ${modelName}`,
                `- Output mode: ${outputMode}`,
                `- Risk threshold: ${minRiskScore}`,
                `- Context size: ${contextChars} characters`,
                `- Context files: ${files.length}`,
                `- Sources checked: ${sources.length}`,
                `- Findings above threshold: ${findings.length}`,
                '',
                '### Release notes checked',
                ...(releaseSources.length ? releaseSources.map((item) => `- ${item.url}`) : ['- None']),
                '',
                '### Developer blog checked',
                ...(developerSources.length ? developerSources.map((item) => `- ${item.url}`) : ['- None']),
                '',
                '### Repository context used',
                ...(files.length ? files.map((file) => `- ${file}`) : ['- No repository files were selected.']),
                ''
              ].join('\n');
            };

            const createOrUpdateAggregateIssue = async (sources, findings) => {
              const latestTitle = findings[0]?.title || 'current sources';
              const issueTitle = `Home Assistant compatibility review: ${latestTitle} and related changes`;
              const body = [
                `Automated compatibility review for **${repoFullName}**.`,
                '',
                'This issue aggregates all findings from the latest run so there is at most one open compatibility review issue.',
                '',
                renderOverviewMarkdown(sources, findings),
                '## Findings',
                '',
                ...findings.map((finding) => renderFindingMarkdown(finding))
              ].join('\n');

              const existing = await github.rest.search.issuesAndPullRequests({
                q: `repo:${repoFullName} is:issue is:open in:title "Home Assistant compatibility review:"`,
                per_page: 10
              });

              if (existing.data.items.length > 0) {
                const issueNumber = existing.data.items[0].number;
                await github.rest.issues.update({ owner, repo, issue_number: issueNumber, title: issueTitle, body });
                return { action: 'updated', issueNumber };
              }

              const created = await github.rest.issues.create({ owner, repo, title: issueTitle, body });
              return { action: 'created', issueNumber: created.data.number };
            };

            const analyzeSource = async (source) => {
              const html = await fetch(source.url).then(async (response) => {
                if (!response.ok) throw new Error(`Failed to fetch source ${source.url}: ${response.status} ${response.statusText}`);
                return response.text();
              });

              const sourceText = htmlToText(html);
              const excerpts = findInterestingSections(sourceText, source.type);
              const condensedSourceText = excerpts.length ? excerpts.join('\n\n---\n\n') : sourceText.slice(0, 18000);
              const sourceId = itemIdFromUrl(source.type, source.url);

              const systemPrompt = [
                'You analyze whether a Home Assistant source is likely to introduce a breaking change or required migration for a specific Home Assistant add-on repository.',
                'Return strict JSON only.',
                'Do not include secrets.',
                'Do not include shell commands that modify GitHub Actions runtime files.',
                'Do not include workflow command syntax beginning with :: .'
              ].join(' ');

              const userPrompt = [
                'Return STRICT JSON only with this exact schema:',
                '{',
                '  "should_create_finding": true,',
                '  "risk_score": 0.0,',
                '  "severity": "low|medium|high|critical",',
                '  "summary": "short summary",',
                '  "reasoning": ["reason 1", "reason 2"],',
                '  "matched_changes": [',
                '    {"title": "change", "excerpt": "quoted excerpt", "impact": "why it matters"}',
                '  ],',
                '  "fix_suggestions": ["suggestion 1", "suggestion 2"],',
                '  "testing_checklist": ["check 1", "check 2"],',
                '  "confidence": "low|medium|high"',
                '}',
                '',
                'Assess likely impact on add-on runtime, supervisor integration, ingress/frontend, packaging, Docker/base image assumptions, external API assumptions, startup behavior, build pipeline changes, and required migrations.',
                'For developer blog migration posts, treat future required migration work as a valid finding even if it is not yet an immediate runtime break.',
                '',
                `Repository: ${repoFullName}`,
                '',
                'Repository context:',
                repoContext,
                '',
                `Source type: ${displaySourceType(source.type)}`,
                `Source identifier: ${sourceId}`,
                `Source URL: ${source.url}`,
                '',
                'Relevant excerpts from the source:',
                condensedSourceText
              ].join('\n');

              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${githubToken}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: modelName,
                  temperature: 0.2,
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                  ]
                })
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`GitHub Models request failed: ${response.status} ${response.statusText} - ${errorText}`);
              }

              const payload = await response.json();
              const outputText = parseModelText(payload);
              if (!outputText) throw new Error(`GitHub Models response did not include message content for ${sourceId}`);

              const analysis = securityCheck(parseJsonResponse(outputText));
              return {
                type: source.type,
                url: source.url,
                title: sourceId,
                analysis
              };
            };

            const releaseSources = await fetchReleaseSources();
            const developerSources = await fetchDeveloperBlogSources();
            const allSources = [...releaseSources, ...developerSources];

            if (!allSources.length) {
              core.setFailed('No Home Assistant sources were found.');
              return;
            }

            const findings = [];
            const runNotes = [];

            for (const source of allSources) {
              const result = await analyzeSource(source);
              const shouldKeep = Boolean(result.analysis.should_create_finding) && result.analysis.risk_score >= minRiskScore;

              if (shouldKeep) {
                findings.push(result);
                runNotes.push(`- ${result.title} [${displaySourceType(result.type)}]: kept (risk=${result.analysis.risk_score}, severity=${result.analysis.severity})`);
              } else {
                runNotes.push(`- ${result.title} [${displaySourceType(result.type)}]: below threshold or not relevant (risk=${result.analysis.risk_score})`);
              }
            }

            const overviewMarkdown = renderOverviewMarkdown(allSources, findings);

            await core.summary
              .addHeading('Home Assistant compatibility analysis', 1)
              .addRaw(overviewMarkdown)
              .addEOL()
              .write();

            if (findings.length) {
              for (const finding of findings) {
                await core.summary
                  .addHeading(`Finding: ${finding.title}`, 2)
                  .addRaw(renderFindingMarkdown(finding))
                  .addEOL()
                  .write();
              }
            } else {
              await core.summary
                .addHeading('Findings', 2)
                .addRaw('No Home Assistant release-note or developer-blog changes exceeded the configured risk threshold.')
                .addEOL()
                .write();
            }

            if (outputMode === 'issue' && findings.length) {
              const issueResult = await createOrUpdateAggregateIssue(allSources, findings);
              await core.summary
                .addHeading('Issue publishing', 2)
                .addRaw(`Aggregate issue ${issueResult.action}: #${issueResult.issueNumber}`)
                .addEOL()
                .write();
              core.info(`Aggregate issue ${issueResult.action}: #${issueResult.issueNumber}`);
            }

            core.info('Run summary:');
            for (const line of runNotes) core.info(line);
