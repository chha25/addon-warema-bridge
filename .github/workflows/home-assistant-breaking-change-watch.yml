name: Watch Home Assistant breaking changes

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      output_mode:
        description: "How to publish findings"
        required: false
        default: "console"
        type: choice
        options:
          - console
          - issue

permissions:
  contents: read
  issues: write
  models: read

jobs:
  detect-breaking-changes:
    runs-on: ubuntu-latest
    env:
      RELEASE_NOTES_INDEX: https://www.home-assistant.io/blog/categories/release-notes/
      GITHUB_MODELS_MODEL: openai/gpt-4.1-mini
      MIN_RISK_SCORE: "0.45"
      OUTPUT_MODE: console
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build add-on context for analysis
        id: build_context
        shell: bash
        run: |
          python <<'PY'
          import glob
          import json
          import os

          patterns = [
              'README*','DOCS*','CHANGELOG*','repository.yaml','build.yaml','build.yml','config.yaml','config.yml','Dockerfile','run.sh',
              '**/config.yaml','**/config.yml','**/build.yaml','**/build.yml','**/Dockerfile','**/run.sh','**/*.md'
          ]

          candidates = []
          for pattern in patterns:
              candidates.extend(glob.glob(pattern, recursive=True))

          selected = []
          seen = set()
          for path in candidates:
              if not os.path.isfile(path): continue
              if path.startswith('.git/') or '/.git/' in path or path.startswith('.github/'): continue
              if path in seen: continue
              seen.add(path)
              selected.append(path)

          selected = sorted(selected)[:20]

          parts = []
          total_chars = 0
          max_total_chars = 50000
          max_file_chars = 5000

          for path in selected:
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      content = f.read(max_file_chars)
              except Exception:
                  continue

              block = f"\n\n### FILE: {path}\n{content.strip()}\n"
              if total_chars + len(block) > max_total_chars:
                  break
              parts.append(block)
              total_chars += len(block)

          context = '\n'.join(parts).strip()
          with open('addon_context.txt', 'w', encoding='utf-8') as f:
              f.write(context)

          print(f"::set-output name=files::{json.dumps(selected)}")
          PY

      - name: Analyze release notes with GitHub Models and publish results
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_OUTPUT_MODE: ${{ inputs.output_mode }}
          ANALYZED_FILES: ${{ steps.build_context.outputs.files }}
        with:
          script: |
            const fs = require('fs');
            const analyzedFiles = JSON.parse(process.env.ANALYZED_FILES || '[]');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const repoFullName = `${owner}/${repo}`;
            const githubModelsModel = process.env.GITHUB_MODELS_MODEL;

            const summaryIntro = [
              '## Analysis Context',
              '',
              `Repository: ${repoFullName}`,
              `Model: ${githubModelsModel}`,
              '',
              '### Analyzed files (context base):',
              ...(analyzedFiles.length ? analyzedFiles.map(f => `- ${f}`) : ['- none detected']),
              '',
              '### Checked against:',
              '- Home Assistant Release Notes (latest 3 versions)',
              '- Breaking Changes / Deprecations / Supervisor / Docker / API sections',
              ''
            ].join('\n');

            await core.summary
              .addHeading('Home Assistant Analysis Overview', 1)
              .addRaw(summaryIntro)
              .addEOL()
              .write();

            core.info('Analysis context:');
            core.info(summaryIntro);

            // existing logic continues unchanged...
